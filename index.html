<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shanosoft IC Suite v3.0</title>
    <style>
        :root { --primary: #FF3300; --bg: #050505; --card: #111; --text: #eee; --gnd: #333; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', Arial, sans-serif; margin: 0; }
        
        #home-page { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; text-align: center; }
        .logo-text { font-size: 3.5rem; font-weight: 900; color: var(--primary); margin: 0; }
        .btn-container { display: flex; gap: 20px; margin-top: 30px; flex-wrap: wrap; justify-content: center; }
        .mode-btn { background: var(--card); border: 1px solid #333; padding: 25px; width: 220px; border-radius: 12px; cursor: pointer; transition: 0.3s; }
        .mode-btn:hover { border-color: var(--primary); background: #1a1a1a; transform: translateY(-3px); }

        #mapper-page { display: none; }
        .nav-bar { background: var(--card); padding: 10px 20px; display: flex; align-items: center; border-bottom: 2px solid var(--primary); justify-content: space-between; }
        .controls { background: #0a0a0a; padding: 12px; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; border-bottom: 1px solid #222; }
        canvas { background: #000; display: block; margin: 15px auto; border: 1px solid #222; cursor: crosshair; box-shadow: 0 0 25px rgba(255,51,0,0.05); }
        
        button { padding: 8px 15px; border-radius: 5px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-home { background: #444; color: white; }
        .btn-save { background: #006600; color: white; }
        .btn-compare { background: #004488; color: white; }
        .btn-reset { background: #660000; color: white; }
        
        input[type="text"] { background: #222; border: 1px solid #444; color: white; padding: 7px; border-radius: 4px; outline: none; }
        input[type="text"]:focus { border-color: var(--primary); }
        #status { text-align: center; color: var(--primary); font-weight: bold; margin: 8px; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div id="home-page">
        <h1 class="logo-text">SHANOSOFT</h1>
        <p style="color:#888; letter-spacing: 1px;">IC DIAGNOSTIC SUITE v3.0 | MAHO</p>
        <div class="btn-container">
            <div class="mode-btn" onclick="openMapper('STD')">
                <h3 style="color:#00FFCC;">STANDARD IC</h3>
                <p style="font-size:0.8rem; color:#666;">BGA / Round Pins Layout</p>
            </div>
            <div class="mode-btn" onclick="openMapper('PA')">
                <h3 style="color:#FFCC00;">PA IC PRO</h3>
                <p style="font-size:0.8rem; color:#666;">Rectangular Pads Layout</p>
            </div>
        </div>
    </div>

    <div id="mapper-page">
        <div class="nav-bar">
            <button class="btn-home" onclick="goHome()">🏠 HOME</button>
            <h3 id="mode-title" style="margin:0;">Mapper</h3>
            <button class="btn-reset" onclick="initGrid()">🔄 RESET</button>
        </div>

        <div class="controls">
            <input type="text" id="model-name" placeholder="IC Model Name">
            <input type="file" id="fileInput" style="display:none;" onchange="handleFile(this)">
            <button class="btn-compare" onclick="document.getElementById('fileInput').click()">📁 COMPARE (LOAD REF)</button>
            <button class="btn-save" onclick="saveAsImage()">📸 SAVE AS IMAGE</button>
        </div>

        <div id="status">පළමුව A1 පින් එක මත Click කරන්න</div>
        <canvas id="icCanvas" width="1050" height="630"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('icCanvas');
        const ctx = canvas.getContext('2d');
        let pads = [], a1Selected = false, currentMode = 'STD', referenceData = {};

        function openMapper(mode) {
            currentMode = mode;
            document.getElementById('home-page').style.display = 'none';
            document.getElementById('mapper-page').style.display = 'block';
            document.getElementById('mode-title').innerText = mode === 'STD' ? 'Standard IC' : 'PA IC Pro';
            initGrid();
        }

        function goHome() {
            if(confirm("මුලට යාමට අවශ්‍යද? දත්ත මැකී යනු ඇත.")) location.reload();
        }

        function initGrid() {
            pads = []; a1Selected = false; referenceData = {};
            let rows = currentMode === 'STD' ? 12 : 8, cols = currentMode === 'STD' ? 12 : 10;
            let pW = currentMode === 'STD' ? 40 : 65, pH = currentMode === 'STD' ? 40 : 35, gap = 12;
            let ox = (canvas.width - (cols * (pW + gap))) / 2, oy = (canvas.height - (rows * (pH + gap))) / 2;

            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    pads.push({ r, c, x: ox + (c * (pW + gap)), y: oy + (r * (pH + gap)), w: pW, h: pH, name: '', val: '', color: '#1a1a1a', isGnd: false });
                }
            }
            document.getElementById('status').innerText = "පළමුව A1 පින් එක මත Click කරන්න";
            draw();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            pads.forEach(p => {
                ctx.fillStyle = p.isGnd ? "#333" : p.color;
                if (currentMode === 'STD') {
                    ctx.beginPath(); ctx.arc(p.x + p.w/2, p.y + p.h/2, p.w/2, 0, Math.PI*2); ctx.fill();
                    ctx.strokeStyle = p.isGnd ? "#555" : "#333"; ctx.stroke();
                } else {
                    ctx.fillRect(p.x, p.y, p.w, p.h);
                    ctx.strokeStyle = p.isGnd ? "#555" : "#333"; ctx.strokeRect(p.x, p.y, p.w, p.h);
                }

                if (p.name) {
                    ctx.fillStyle = "#666"; ctx.font = "9px Arial"; ctx.fillText(p.name, p.x + 4, p.y + 11);
                }
                if (p.val) {
                    let refV = referenceData[p.name];
                    let isBad = refV && Math.abs(parseFloat(refV) - parseFloat(p.val)) > (parseFloat(refV) * 0.15);
                    
                    ctx.fillStyle = p.isGnd ? "#FFFF00" : (isBad ? "#FF1100" : "#00FFCC");
                    ctx.font = "bold 12px Arial";
                    let valToDisplay = p.isGnd ? "GND" : p.val;
                    ctx.fillText(valToDisplay, p.x + 6, p.y + p.h - 8);
                    
                    if(refV && !p.isGnd) { 
                        ctx.fillStyle = "#888"; ctx.font = "9px Arial"; 
                        ctx.fillText("R:"+refV, p.x + 6, p.y + p.h - 22); 
                    }
                }
            });
        }

        canvas.onclick = (e) => {
            const rect = canvas.getBoundingClientRect();
            const mx = e.clientX - rect.left, my = e.clientY - rect.top;
            pads.forEach(p => {
                if (mx > p.x && mx < p.x + p.w && my > p.y && my < p.y + p.h) {
                    if (!a1Selected) {
                        pads.forEach(pd => { 
                            pd.name = String.fromCharCode(65 + (pd.r - p.r)) + ((pd.c - p.c) + 1); 
                            if(pd.r==p.r && pd.c==p.c) pd.color="#440000"; 
                        });
                        a1Selected = true; 
                        document.getElementById('status').innerText = "පින් එකක් මත Click කර අගය ඇතුළත් කරන්න (GND සඳහා 0 ඇතුළත් කරන්න).";
                    } else {
                        let v = prompt(`Pad ${p.name} Value:`, p.val);
                        if (v !== null) { 
                            p.val = v;
                            p.isGnd = (v === "0" || v.toLowerCase() === "gnd" || v === "000");
                            p.color = p.isGnd ? "#222" : "#002244"; 
                        }
                    }
                    draw();
                }
            });
        };

        function handleFile(input) {
            const reader = new FileReader();
            reader.onload = () => {
                reader.result.split('\n').forEach(line => {
                    if(line.includes(':')) { 
                        let [n, v] = line.split(':'); 
                        referenceData[n.trim()] = v.trim(); 
                    }
                });
                alert("Reference Data Loaded සාර්ථකයි!");
                draw();
            };
            reader.readAsText(input.files[0]);
        }

        function saveAsImage() {
            const link = document.createElement('a');
            const model = document.getElementById('model-name').value || 'Shanosoft_IC';
            link.download = model + '.png';
            link.href = canvas.toDataURL(); link.click();
        }
    </script>
</body>
</html>
