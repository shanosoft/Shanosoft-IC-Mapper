<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shanosoft IC Suite Pro</title>
    <style>
        :root { --primary: #FF3300; --bg: #050505; --card: #111; --text: #eee; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', Arial, sans-serif; margin: 0; }
        
        #home-page { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; text-align: center; }
        .logo-text { font-size: 3.5rem; font-weight: 900; color: var(--primary); margin: 0; }
        .btn-container { display: flex; gap: 20px; margin-top: 30px; flex-wrap: wrap; justify-content: center; }
        .mode-btn { background: var(--card); border: 1px solid #333; padding: 25px; width: 220px; border-radius: 12px; cursor: pointer; transition: 0.3s; }
        .mode-btn:hover { border-color: var(--primary); background: #1a1a1a; }

        #mapper-page { display: none; }
        .nav-bar { background: var(--card); padding: 10px 20px; display: flex; align-items: center; border-bottom: 2px solid var(--primary); justify-content: space-between; }
        .controls { background: #0a0a0a; padding: 10px; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        canvas { background: #000; display: block; margin: 10px auto; border: 1px solid #222; cursor: crosshair; }
        
        button { padding: 8px 15px; border-radius: 5px; border: none; font-weight: bold; cursor: pointer; }
        .btn-home { background: #444; color: white; }
        .btn-save { background: #006600; color: white; }
        .btn-compare { background: #004488; color: white; }
        input[type="text"] { background: #222; border: 1px solid #444; color: white; padding: 7px; border-radius: 4px; }
        #status { text-align: center; color: var(--primary); font-weight: bold; margin: 5px; }
    </style>
</head>
<body>

    <div id="home-page">
        <h1 class="logo-text">SHANOSOFT</h1>
        <p style="color:#888;">IC DIAGNOSTIC SUITE v2.5</p>
        <div class="btn-container">
            <div class="mode-btn" onclick="openMapper('STD')">
                <h3 style="color:#00FFCC;">STANDARD IC</h3>
                <p>Round Pins</p>
            </div>
            <div class="mode-btn" onclick="openMapper('PA')">
                <h3 style="color:#FFCC00;">PA IC PRO</h3>
                <p>Rectangular Pads</p>
            </div>
        </div>
    </div>

    <div id="mapper-page">
        <div class="nav-bar">
            <button class="btn-home" onclick="goHome()">🏠 HOME</button>
            <h3 id="mode-title" style="margin:0;">Mapper</h3>
            <div style="width:80px;"></div>
        </div>

        <div class="controls">
            <input type="text" id="model-name" placeholder="IC Model">
            <input type="file" id="fileInput" style="display:none;" onchange="handleFile(this)">
            <button class="btn-compare" onclick="document.getElementById('fileInput').click()">📁 LOAD REF (.TXT)</button>
            <button class="btn-save" onclick="saveAsImage()">📸 SAVE IMAGE</button>
        </div>

        <div id="status">පළමුව A1 ස්ථානය තෝරන්න</div>
        <canvas id="icCanvas" width="1000" height="620"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('icCanvas');
        const ctx = canvas.getContext('2d');
        let pads = [], a1Selected = false, currentMode = 'STD', referenceData = {};

        function openMapper(mode) {
            currentMode = mode;
            document.getElementById('home-page').style.display = 'none';
            document.getElementById('mapper-page').style.display = 'block';
            initGrid();
        }

        function goHome() {
            if(confirm("මුලට යාමට අවශ්‍යද?")) location.reload();
        }

        function initGrid() {
            pads = []; a1Selected = false; referenceData = {};
            let rows = currentMode === 'STD' ? 12 : 8, cols = currentMode === 'STD' ? 12 : 10;
            let pW = currentMode === 'STD' ? 38 : 60, pH = currentMode === 'STD' ? 38 : 32, gap = 12;
            let ox = (canvas.width - (cols * (pW + gap))) / 2, oy = (canvas.height - (rows * (pH + gap))) / 2;

            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    pads.push({ r, c, x: ox + (c * (pW + gap)), y: oy + (r * (pH + gap)), w: pW, h: pH, name: '', val: '', color: '#1a1a1a' });
                }
            }
            draw();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            pads.forEach(p => {
                ctx.fillStyle = p.color;
                if (currentMode === 'STD') {
                    ctx.beginPath(); ctx.arc(p.x + p.w/2, p.y + p.h/2, p.w/2, 0, Math.PI*2); ctx.fill();
                } else {
                    ctx.fillRect(p.x, p.y, p.w, p.h);
                }
                ctx.strokeStyle = "#333"; ctx.stroke();

                if (p.name) {
                    ctx.fillStyle = "#666"; ctx.font = "9px Arial"; ctx.fillText(p.name, p.x + 3, p.y + 10);
                }
                if (p.val) {
                    let refV = referenceData[p.name];
                    let isBad = refV && Math.abs(parseFloat(refV) - parseFloat(p.val)) > (parseFloat(refV) * 0.15);
                    ctx.fillStyle = isBad ? "#FF1100" : "#00FF44";
                    ctx.font = "bold 11px Arial";
                    ctx.fillText(p.val, p.x + 5, p.y + p.h - 5);
                    if(refV) { ctx.fillStyle = "#888"; ctx.font = "8px Arial"; ctx.fillText("R:"+refV, p.x + 5, p.y + p.h - 18); }
                }
            });
        }

        canvas.onclick = (e) => {
            const rect = canvas.getBoundingClientRect();
            const mx = e.clientX - rect.left, my = e.clientY - rect.top;
            pads.forEach(p => {
                if (mx > p.x && mx < p.x + p.w && my > p.y && my < p.y + p.h) {
                    if (!a1Selected) {
                        pads.forEach(pd => { pd.name = String.fromCharCode(65 + (pd.r - p.r)) + ((pd.c - p.c) + 1); if(pd.r==p.r && pd.c==p.c) pd.color="#400"; });
                        a1Selected = true; document.getElementById('status').innerText = "අගයන් ඇතුළත් කරන්න.";
                    } else {
                        let v = prompt(`Pad ${p.name} Value:`);
                        if (v) { p.val = v; p.color = "#001a33"; }
                    }
                    draw();
                }
            });
        };

        function handleFile(input) {
            const reader = new FileReader();
            reader.onload = () => {
                reader.result.split('\n').forEach(line => {
                    if(line.includes(':')) { let [n, v] = line.split(':'); referenceData[n.trim()] = v.trim(); }
                });
                alert("Reference Data Loaded! දැන් අගයන් මැන බලන්න.");
                draw();
            };
            reader.readAsText(input.files[0]);
        }

        function saveAsImage() {
            const link = document.createElement('a');
            link.download = (document.getElementById('model-name').value || 'Shanosoft') + '.png';
            link.href = canvas.toDataURL(); link.click();
        }
    </script>
</body>
</html>
