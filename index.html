<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shanosoft IC Suite</title>
    <style>
        :root { --primary: #FF3300; --bg: #050505; --card: #111; --text: #eee; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', Arial, sans-serif; margin: 0; overflow-x: hidden; }
        
        /* Home Page Styles */
        #home-page { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; text-align: center; }
        .logo-text { font-size: 3.5rem; font-weight: 900; color: var(--primary); margin: 0; letter-spacing: 2px; }
        .sub-text { color: #888; margin-bottom: 40px; }
        .btn-container { display: flex; gap: 25px; flex-wrap: wrap; justify-content: center; }
        .mode-btn { background: var(--card); border: 1px solid #333; padding: 30px; width: 250px; border-radius: 12px; cursor: pointer; transition: 0.3s; }
        .mode-btn:hover { border-color: var(--primary); transform: translateY(-5px); background: #1a1a1a; }
        .mode-btn h3 { margin: 10px 0; color: #00FFCC; }
        .mode-btn.pa h3 { color: #FFCC00; }

        /* Mapper UI Styles */
        #mapper-page { display: none; }
        .nav-bar { background: var(--card); padding: 10px 20px; display: flex; align-items: center; border-bottom: 2px solid var(--primary); sticky: top; }
        .controls { background: #0a0a0a; padding: 15px; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; align-items: center; }
        canvas { background: #000; display: block; margin: 20px auto; border: 1px solid #222; box-shadow: 0 0 30px rgba(0,0,0,0.5); cursor: crosshair; }
        
        button { padding: 8px 15px; border-radius: 5px; border: none; font-weight: bold; cursor: pointer; }
        .btn-home { background: #444; color: white; margin-right: 15px; }
        .btn-save { background: #006600; color: white; }
        .btn-load { background: #004488; color: white; }
        input { background: #222; border: 1px solid #444; color: white; padding: 7px; border-radius: 4px; }
        #status { text-align: center; color: var(--primary); font-weight: bold; margin: 10px 0; }
    </style>
</head>
<body>

    <div id="home-page">
        <h1 class="logo-text">SHANOSOFT</h1>
        <p class="sub-text">MOBILE IC DIAGNOSTIC & MAPPING SUITE</p>
        <div class="btn-container">
            <div class="mode-btn" onclick="openMapper('STD')">
                <h3>STANDARD IC</h3>
                <p>BGA / Round Pins Layout</p>
            </div>
            <div class="mode-btn pa" onclick="openMapper('PA')">
                <h3>PA IC PRO</h3>
                <p>Rectangular Pads Layout</p>
            </div>
        </div>
        <p style="margin-top: 50px; color: #444;">Maho, Sri Lanka</p>
    </div>

    <div id="mapper-page">
        <div class="nav-bar">
            <button class="btn-home" onclick="goHome()">🏠 HOME</button>
            <h3 id="mode-title" style="margin:0;">IC Mapper</h3>
        </div>

        <div class="controls">
            <input type="text" id="model-name" placeholder="IC Model (e.g. PM8953)">
            <button class="btn-load" onclick="loadRefFile()">LOAD REF</button>
            <button class="btn-save" onclick="saveAsImage()">SAVE IMAGE</button>
        </div>

        <div id="status">පළමුව A1 ස්ථානය තෝරන්න</div>
        <canvas id="icCanvas" width="1000" height="650"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('icCanvas');
        const ctx = canvas.getContext('2d');
        let pads = [];
        let a1Selected = false;
        let currentMode = 'STD';
        let referenceData = {};

        function openMapper(mode) {
            currentMode = mode;
            document.getElementById('home-page').style.display = 'none';
            document.getElementById('mapper-page').style.display = 'block';
            document.getElementById('mode-title').innerText = mode === 'STD' ? 'Standard IC Mapper' : 'PA IC Pro Mapper';
            document.getElementById('mode-title').style.color = mode === 'STD' ? '#00FFCC' : '#FFCC00';
            initGrid();
        }

        function goHome() {
            if(confirm("නැවත මුල් පිටුවට යාමට අවශ්‍යද? දත්ත මැකී යනු ඇත.")) {
                document.getElementById('home-page').style.display = 'flex';
                document.getElementById('mapper-page').style.display = 'none';
            }
        }

        function initGrid() {
            pads = [];
            a1Selected = false;
            referenceData = {};
            let rows = currentMode === 'STD' ? 12 : 8;
            let cols = currentMode === 'STD' ? 12 : 10;
            let pW = currentMode === 'STD' ? 38 : 60;
            let pH = currentMode === 'STD' ? 38 : 35;
            let gap = 12;

            let totalW = (cols * (pW + gap)) - gap;
            let totalH = (rows * (pH + gap)) - gap;
            let offX = (canvas.width - totalW) / 2;
            let offY = (canvas.height - totalH) / 2;

            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    pads.push({
                        r, c,
                        x: offX + (c * (pW + gap)), y: offY + (r * (pH + gap)),
                        w: pW, h: pH,
                        name: '', val: '', color: '#1a1a1a'
                    });
                }
            }
            document.getElementById('status').innerText = "පළමුව A1 ස්ථානය තෝරන්න";
            draw();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            pads.forEach(p => {
                ctx.fillStyle = p.color;
                if (currentMode === 'STD') {
                    ctx.beginPath();
                    ctx.arc(p.x + p.w/2, p.y + p.h/2, p.w/2, 0, Math.PI*2);
                    ctx.fill();
                    ctx.strokeStyle = "#333";
                    ctx.stroke();
                } else {
                    ctx.fillRect(p.x, p.y, p.w, p.h);
                    ctx.strokeStyle = "#333";
                    ctx.strokeRect(p.x, p.y, p.w, p.h);
                }

                if (p.name) {
                    ctx.fillStyle = "#666";
                    ctx.font = "9px Arial";
                    ctx.fillText(p.name, p.x + 4, p.y + 12);
                }
                if (p.val) {
                    let refVal = referenceData[p.name] || null;
                    let isBad = false;
                    if(refVal) {
                        isBad = Math.abs(parseFloat(refVal) - parseFloat(p.val)) > (parseFloat(refVal) * 0.15);
                    }
                    ctx.fillStyle = isBad ? "#FF1100" : "#00FF44";
                    ctx.font = "bold 11px Arial";
                    ctx.fillText(p.val, p.x + 5, p.y + p.h - 8);
                    if(refVal) {
                        ctx.fillStyle = "#888";
                        ctx.font = "9px Arial";
                        ctx.fillText("R:"+refVal, p.x + 5, p.y + p.h - 22);
                    }
                }
            });
        }

        canvas.onclick = function(e) {
            const rect = canvas.getBoundingClientRect();
            const mx = e.clientX - rect.left;
            const my = e.clientY - rect.top;

            pads.forEach(p => {
                if (mx > p.x && mx < p.x + p.w && my > p.y && my < p.y + p.h) {
                    if (!a1Selected) {
                        setLabels(p.r, p.c);
                        a1Selected = true;
                        document.getElementById('status').innerText = "පෑඩ් එකක් මත ක්ලික් කර අගයන් ඇතුළත් කරන්න.";
                    } else {
                        let v = prompt(`Pad ${p.name} Value:`);
                        if (v) { p.val = v; p.color = "#001a33"; }
                    }
                    draw();
                }
            });
        };

        function setLabels(sr, sc) {
            pads.forEach(p => {
                p.name = String.fromCharCode(65 + (p.r - sr)) + ((p.c - sc) + 1);
                if (p.r === sr && p.c === sc) { p.color = "#440000"; p.name = "A1"; }
            });
        }

        function saveAsImage() {
            const link = document.createElement('a');
            link.download = (document.getElementById('model-name').value || 'Shanosoft_Map') + '.png';
            link.href = canvas.toDataURL();
            link.click();
        }

        function loadRefFile() {
            alert("Web Edition එකේ දැනට Image සේව් කිරීම පමණක් කළ හැක. .txt ෆයිල් ලෝඩ් කිරීම ඉදිරි අප්ඩේට් එකකින් ලබා දෙනු ඇත.");
        }
    </script>
</body>
</html>
